services:
  nginx:
    image: nginx:latest
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./nginx/ssl:/etc/nginx/ssl
    depends_on:
      - web

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "3500:3100"
    env_file:
      - apps/web/.env
