name: Direct SSH Build and Deploy

on:
  pull_request:
    branches:
      - production
    types: [closed]

jobs:
  deploy:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          command_timeout: 15m
          script: |
            set -e  # Exit on any error

            echo "🚀 Starting deployment..."

            # Navigate to app directory
            cd ~/services/portfolio || {
              echo "❌ App directory not found!"
              exit 1
            }

            # Show current status
            echo "📋 Current branch: $(git branch --show-current)"
            echo "📋 Current commit: $(git rev-parse --short HEAD)"

            # Pull latest changes (without SSH agent setup if using HTTPS or if SSH is already configured)
            echo "⬇️ Pulling latest code..."
            git fetch origin
            git reset --hard origin/production

            # Show new status
            echo "📋 New commit: $(git rev-parse --short HEAD)"
            echo "📋 Changes pulled successfully"

            # Stop existing containers gracefully
            echo "⏹️ Stopping existing containers..."
            if docker compose ps -q | grep -q .; then
              docker compose down --timeout 30
            else
              echo "No containers currently running"
            fi

            # Build new Docker image
            echo "🔨 Building Docker image..."
            docker compose build --no-cache

            # Start new containers
            echo "▶️ Starting new containers..."
            docker compose up -d

            # Wait for containers to be ready
            echo "⏳ Waiting for containers to start..."
            sleep 15

            # Health check
            echo "🏥 Performing health check..."
            if docker compose ps --format json | grep -q '"State":"running"'; then
              echo "✅ Containers are running!"
              docker compose ps
            else
              echo "❌ Some containers failed to start!"
              docker compose ps
              docker compose logs --tail=50
              exit 1
            fi

            # Test if the application is responding (adjust URL/port as needed)
            echo "🌐 Testing application response..."
            if curl -f -s http://localhost:3000 > /dev/null 2>&1; then
              echo "✅ Application is responding!"
            else
              echo "⚠️ Application might not be ready yet (this may be normal)"
            fi

            # Cleanup old images and containers
            echo "🧹 Cleaning up old images..."
            docker image prune -f
            docker container prune -f
            docker system prune -f --volumes=false

            echo "🎉 Deployment completed successfully!"
